  recommender-ai-service:
    build:
      context: ./services/recommender-ai-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DEBUG: "1"
      DATABASE_URL: postgres://books:books@postgres:5432/recommender_db
