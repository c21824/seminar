      DJANGO_SECRET_KEY: dev-secret
      DEBUG: "1"
      DATABASE_URL: postgres://books:books@postgres:5432/book_db
      SERVICE_NAME: book-service
      SERVICE_PORT: "8000"
    ports:
      - "8005:8000"
    depends_on:
      - postgres
      - rabbitmq
      - redis


  cart-service:
