
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: books
      POSTGRES_PASSWORD: books
      POSTGRES_DB: gateway_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"


  staff-service:
    build:
      context: ./services/staff-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DEBUG: "1"
      DATABASE_URL: postgres://books:books@postgres:5432/staff_db
      SERVICE_NAME: staff-service
      SERVICE_PORT: "8000"
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - rabbitmq
      - redis


  manager-service:
    build:
      context: ./services/manager-service
    environment:
      DJANGO_SECRET_KEY: dev-secret
      DEBUG: "1"
      DATABASE_URL: postgres://books:books@postgres:5432/manager_db
      SERVICE_NAME: manager-service
      SERVICE_PORT: "8000"
    ports:
      - "8002:8000"
    depends_on:
      - postgres
      - rabbitmq
      - redis


  customer-service:
